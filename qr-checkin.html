<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KORA · check-in QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { display:flex; justify-content:center; align-items:center; padding:1.2rem; }
    .qr-wrap { width:min(44rem,100%); display:grid; gap:1rem; }
    .qr-card { padding:1.1rem; border-radius:1.8rem; background:linear-gradient(180deg, rgba(18,16,24,.96), rgba(10,10,14,.98)); border:1px solid rgba(255,255,255,.12); box-shadow:var(--shadow-xl); display:grid; gap:1rem; }
    .qr-layout { display:grid; grid-template-columns:1fr 0.9fr; gap:1rem; align-items:center; }
    .qr-layout img { border-radius:1.2rem; }
    @media (max-width: 780px) { .qr-layout { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="qr-wrap">
    <section class="qr-card">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Pasaporte cultural</p>
          <h1 class="section-title" id="event-name">Check-in KORA</h1>
        </div>
        <a class="soft-btn" href="index.html">Volver al demo</a>
      </div>
      <div class="qr-layout">
        <img id="event-poster" src="assets/img/poster-festival-centro.svg" alt="Poster del evento">
        <div class="settings-stack">
          <img id="event-qr" src="assets/img/qr-festival-centro.svg" alt="QR del evento">
          <p id="event-copy" class="helper-copy">Escanea o toca reclamar para simular el check-in.</p>
          <button class="primary-btn full-btn" id="claim-btn" type="button">Reclamar sello y XP</button>
          <div id="claim-state" class="empty-state">Todavía no has reclamado este sello.</div>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/data.js"></script>
  <script>
    (function () {
      const data = window.KORA_DATA;
      const params = new URLSearchParams(window.location.search);
      const eventId = params.get('event') || data.events[0].id;
      const eventItem = data.events.find((item) => item.id === eventId) || data.events[0];
      const key = data.storageKey;
      const state = JSON.parse(localStorage.getItem(key) || '{}');
      state.checkedEventIds = Array.isArray(state.checkedEventIds) ? state.checkedEventIds : [];
      state.completedMissionIds = Array.isArray(state.completedMissionIds) ? state.completedMissionIds : [];

      document.getElementById('event-name').textContent = eventItem.name;
      document.getElementById('event-poster').src = eventItem.poster;
      document.getElementById('event-poster').alt = eventItem.name;
      document.getElementById('event-qr').src = eventItem.qr;
      document.getElementById('event-copy').textContent = `${eventItem.place} · ${eventItem.time} · +${eventItem.reward} XP`;

      const stateBox = document.getElementById('claim-state');
      const btn = document.getElementById('claim-btn');

      function renderClaim() {
        const claimed = state.checkedEventIds.includes(eventItem.id);
        stateBox.textContent = claimed ? `Sello obtenido: ${eventItem.stamp}. Ya puedes volver a la app.` : 'Todavía no has reclamado este sello.';
        btn.textContent = claimed ? 'Sello reclamado' : 'Reclamar sello y XP';
        btn.disabled = claimed;
        btn.style.opacity = claimed ? '0.55' : '1';
        btn.style.pointerEvents = claimed ? 'none' : 'auto';
      }

      btn.addEventListener('click', () => {
        if (!state.checkedEventIds.includes(eventItem.id)) {
          state.checkedEventIds.push(eventItem.id);
        }
        const mission = data.missions.find((item) => item.id === 'checkin-once');
        if (mission && !state.completedMissionIds.includes(mission.id)) {
          state.completedMissionIds.push(mission.id);
        }
        localStorage.setItem(key, JSON.stringify(state));
        renderClaim();
      });

      renderClaim();
    })();
  </script>
</body>
</html>
