<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KORA · check-in QR</title>
  <link rel="icon" href="assets/img/marca.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script>try{const raw=localStorage.getItem('kora-prototype-v3-state');const parsed=raw?JSON.parse(raw):null;document.documentElement.dataset.theme=parsed?.settings?.themeMode==='light'?'light':'dark';}catch(error){document.documentElement.dataset.theme='dark';}</script>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { display:flex; justify-content:center; align-items:center; padding:1.2rem; }
    .qr-wrap { width:min(44rem,100%); display:grid; gap:1rem; }
    .qr-card { padding:1.1rem; border-radius:1.8rem; background:var(--overlay-card-surface); border:1px solid var(--line-strong); box-shadow:var(--shadow-xl); display:grid; gap:1rem; }
    .qr-layout { display:grid; grid-template-columns:1fr 0.9fr; gap:1rem; align-items:center; }
    .qr-layout img { border-radius:1.2rem; }
    @media (max-width: 780px) { .qr-layout { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="qr-wrap">
    <section class="qr-card">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Pasaporte cultural</p>
          <h1 class="section-title" id="event-name">Check-in KORA</h1>
        </div>
        <a class="soft-btn" href="index.html">Volver al demo</a>
      </div>
      <div class="qr-layout">
        <img id="event-poster" src="assets/img/poster-festival-centro.svg" alt="Poster del evento">
        <div class="settings-stack">
          <img id="event-qr" src="assets/img/qr-festival-centro.svg" alt="QR del evento">
          <p id="event-copy" class="helper-copy">Escanea o toca reclamar para simular el check-in.</p>
          <button class="primary-btn full-btn" id="claim-btn" type="button">Reclamar sello y XP</button>
          <div id="claim-state" class="empty-state">Todavía no has reclamado este sello.</div>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/data/data.js"></script>
  <script type="module" src="assets/js/qr-checkin.js"></script>
</body>
</html>
