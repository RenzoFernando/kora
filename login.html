<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KORA · login demo</title>
  <link rel="icon" href="assets/img/marca.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; padding:1.2rem; }
    .login-wrap { width:min(78rem,100%); display:grid; gap:1rem; }
    .login-hero { padding:1.1rem; border-radius:1.8rem; background:rgba(15,12,22,0.8); border:1px solid rgba(255,255,255,0.08); box-shadow:var(--shadow-md); display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .login-copy h1 { margin:0; font-family:var(--font-head); font-size:clamp(2rem,4vw,3.6rem); }
    .login-copy p { color:var(--text-soft); margin:0.4rem 0 0; }
    .login-brand { display:flex; gap:0.8rem; align-items:center; }
    .login-brand img:first-child { width:3rem; height:3rem; }
    .login-brand img:last-child { width:10rem; }
    .login-card { width:min(78rem,100%); }
  </style>
</head>
<body>
  <main class="login-wrap">
    <section class="login-hero">
      <div class="login-copy">
        <p class="eyebrow">Acceso de demostración</p>
        <h1>Entrar a KORA</h1>
        <p>Selecciona un oyente del equipo o un rol demo. El perfil se guarda en localStorage y abre el prototipo principal.</p>
      </div>
      <div class="login-brand">
        <img src="assets/img/marca.svg" alt="Marca KORA">
        <img src="assets/img/kora.svg" alt="KORA">
      </div>
    </section>

    <section class="overlay-card login-card">
      <div class="overlay-sections">
        <section>
          <div class="section-head simple-head">
            <div>
              <p class="eyebrow">Equipo</p>
              <h2 class="section-title small-title">Oyentes del proyecto</h2>
            </div>
            <a class="soft-btn" href="index.html">Abrir app</a>
          </div>
          <div class="profile-grid" id="login-team-grid"></div>
        </section>
        <section>
          <div class="section-head simple-head">
            <div>
              <p class="eyebrow">Roles demo</p>
              <h2 class="section-title small-title">Cuentas para la presentación</h2>
            </div>
          </div>
          <div class="profile-grid" id="login-role-grid"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="assets/data/data.js"></script>
  <script>
    (function () {
      const data = window.KORA_DATA;
      const key = data.storageKey;
      const allProfiles = [...data.teamMembers, ...data.demoRoles];
      const defaults = {
        device: 'phone',
        view: 'discover',
        loggedIn: true,
        profileId: data.teamMembers[0].id,
        activeEventId: data.events[0].id,
        selectedArtistId: data.artists[0].id,
        savedArtistIds: ['los-pleneros'],
        likedArtistIds: [],
        checkedEventIds: [],
        sharedTargets: [],
        playlistArtistIds: data.playlists[0].tracks.slice(),
        playlistContributions: 0,
        completedMissionIds: [],
        settings: {
          autoLogin: true,
          publicProfile: false,
          preview30: true,
          autoplay: false,
          audioMode: 'Demo HQ',
          eventAlerts: true,
          missionAlerts: true,
          highContrast: false,
          captions: true
        }
      };

      function save(profileId) {
        const state = Object.assign({}, defaults, { profileId, loggedIn: true });
        localStorage.setItem(key, JSON.stringify(state));
        window.location.href = 'index.html';
      }

      function render(items, mountId) {
        document.getElementById(mountId).innerHTML = items.map((profile) => `
          <button class="profile-card" type="button" data-login="${profile.id}">
            <img src="${profile.avatar}" alt="${profile.name}">
            <strong>${profile.name}</strong>
            <span>${profile.role}</span>
            <small>${profile.code}</small>
          </button>`).join('');
      }

      render(data.teamMembers, 'login-team-grid');
      render(data.demoRoles, 'login-role-grid');
      document.querySelectorAll('[data-login]').forEach((button) => {
        button.addEventListener('click', () => save(button.dataset.login));
      });
    })();
  </script>
</body>
</html>
