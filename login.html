<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KORA · login demo</title>
  <link rel="icon" href="assets/img/marca.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script>try{const raw=localStorage.getItem('kora-prototype-v3-state');const parsed=raw?JSON.parse(raw):null;document.documentElement.dataset.theme=parsed?.settings?.themeMode==='light'?'light':'dark';}catch(error){document.documentElement.dataset.theme='dark';}</script>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; padding:1.2rem; }
    .login-wrap { width:min(78rem,100%); display:grid; gap:1rem; }
    .login-hero { padding:1.1rem; border-radius:1.8rem; background:var(--overlay-card-surface); border:1px solid var(--line-strong); box-shadow:var(--shadow-md); display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .login-copy h1 { margin:0; font-family:var(--font-head); font-size:clamp(2rem,4vw,3.6rem); }
    .login-copy p { color:var(--text-soft); margin:0.4rem 0 0; }
    .login-brand { display:flex; gap:0.8rem; align-items:center; }
    .login-brand .brand-mark { width:3rem; height:3rem; }
    .login-brand .brand-word { width:10rem; }
    .login-card { width:min(78rem,100%); }
  </style>
</head>
<body>
  <main class="login-wrap">
    <section class="login-hero">
      <div class="login-copy">
        <p class="eyebrow">Acceso de demostración</p>
        <h1>Entrar a KORA</h1>
        <p>Selecciona un oyente del equipo o un rol demo. El perfil se guarda en localStorage y abre el prototipo principal.</p>
      </div>
      <div class="login-brand">
        <img class="brand-mark brand-mark--shell" src="assets/img/marca.svg" alt="Marca KORA">
        <span class="brand-word-wrap"><img class="brand-word" src="assets/img/kora.svg" alt="KORA"></span>
      </div>
    </section>

    <section class="overlay-card login-card">
      <div class="overlay-sections">
        <section>
          <div class="section-head simple-head">
            <div>
              <p class="eyebrow">Equipo</p>
              <h2 class="section-title small-title">Oyentes del proyecto</h2>
            </div>
            <a class="soft-btn" href="index.html">Abrir app</a>
          </div>
          <div class="profile-grid" id="login-team-grid"></div>
        </section>
        <section>
          <div class="section-head simple-head">
            <div>
              <p class="eyebrow">Roles demo</p>
              <h2 class="section-title small-title">Cuentas para la presentación</h2>
            </div>
          </div>
          <div class="profile-grid" id="login-role-grid"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="assets/data/data.js"></script>
  <script type="module" src="assets/js/login.js"></script>
</body>
</html>
